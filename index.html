      --line: rgba(255,255,255,.08);
      --text: #f7f1e8;
      --muted: #d7c6b3;
      --accent: #f0b04c;
      --accent-2: #8c5c36;
      --ok: #78c97c;
      --warn: #ffbe62;

    html, body { margin: 0; padding: 0; }

    .topbar {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;

      border-bottom: 1px solid var(--line);
      background: rgba(18, 15, 13, .94);
      backdrop-filter: blur(10px);

    .brandline { display: flex; align-items: center; gap: 14px; }
    .brandlogo {

      display: grid; place-items: center; font-family: 'Lobster', cursive; font-size: 24px; color: var(--accent);

    .brandlogo img { width: 100%; height: 100%; object-fit: cover; }

    .titlewrap p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .nav { display: flex; flex-wrap: wrap; gap: 10px; }
    .nav button {

    }
    .nav button.active { background: linear-gradient(180deg, #f0b04c, #d28a25); color: #20130d; border-color: transparent; }
    .layout { display: grid; grid-template-columns: 420px 1fr; min-height: calc(100vh - 87px); }
    .sidebar {

    }
    .workspace { padding: 18px; overflow: auto; }
    .intro {
      padding: 18px; background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 14px;

    .intro h2 { margin: 0 0 8px; font-size: 28px; color: var(--accent); }
    .intro p { margin: 0; line-height: 1.55; color: var(--muted); }
    .panel {

    }
    .panel + .panel { margin-top: 14px; }
    .panel-head { padding: 16px 18px; border-bottom: 1px solid var(--line); display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .panel-head h2, .panel-head h3 { margin: 0; font-size: 18px; }
    .panel-body { padding: 16px 18px 18px; }
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .grid-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:14px; }
    .stack { display:flex; flex-direction:column; gap:12px; }
    .row { display:flex; gap:10px; align-items:center; }
    .wrap { flex-wrap: wrap; }
    .grow { flex:1; }
    .metric { padding:18px; background:var(--panel); border:1px solid var(--line); border-radius:18px; }
    .metric small { color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-size:11px; }
    .metric strong { display:block; font-size:30px; margin-top:6px; }
    .metric span { color:var(--muted); font-size:13px; }
    label { display:block; margin:10px 0 6px; color:#ccb6a2; font-size:12px; text-transform:uppercase; letter-spacing:.08em; font-weight:700; }
    input, select, textarea, button { width:100%; font:inherit; border-radius:12px; border:1px solid var(--line); }
    input, select, textarea {

    }

    input[type="file"] { padding: 9px; }
    textarea { min-height: 96px; resize: vertical; }
    .btn {

    }

    .status-warn { color: var(--warn); }
    .status-bad { color: var(--bad); }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:16px; }
    table { width:100%; border-collapse: collapse; min-width:760px; }
    th, td { padding:12px 14px; border-bottom:1px solid var(--line); text-align:left; font-size:14px; vertical-align:top; }

    .hidden { display:none !important; }

    .form-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; }

    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>"']/g, s => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[s]));
    }

    function slugify(text) {
      return (text || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '') || 'item';
    }

    function calculateRecipeCost(recipe) {
      return (recipe.ingredients || []).reduce((sum, line) => {
        const ingredient = getIngredient(line.id);
        return sum + ((ingredient?.price || 0) * Number(line.amount || 0));
      }, 0);
    }

    function foodCostPct(recipe) {
      const sellPrice = Number(recipe.sellPrice || 0);
      if (!sellPrice) return 0;
      return (calculateRecipeCost(recipe) / sellPrice) * 100;
    }

    function getMissingForRecipe(recipe) {
      const missing = [];
      for (const line of (recipe.ingredients || [])) {
        const ingredient = getIngredient(line.id);
        if (!ingredient) {
          missing.push(`Ontbrekend ingrediëntrecord: ${line.id}`);
          continue;
        }
        if (!ingredient.active) missing.push(`${ingredient.name} staat inactief`);
      }
      return missing;
    }

    function recipeStatus(recipe) {
      const missing = getMissingForRecipe(recipe);
      if (missing.length) return { label: 'Niet haalbaar', cls:'status-bad', lines: missing };
      const cost = calculateRecipeCost(recipe);
      if (!cost) return { label: 'Controle nodig', cls:'status-warn', lines:['Geen kostprijs beschikbaar'] };
      const pct = foodCostPct(recipe);
      if (pct > 65) return { label: 'Dunne marge', cls:'status-warn', lines:[`Food cost ${pct.toFixed(1)}%`] };
      return { label: 'Haalbaar', cls:'status-ok', lines:[`Food cost ${pct.toFixed(1)}%`] };
    }

    function groupedRecipes() {
      return app.state.recipes.filter(r => r.active !== false).reduce((acc, recipe) => {
        const key = recipe.category || 'Overig';
        if (!acc[key]) acc[key] = [];
        acc[key].push(recipe);
        return acc;
      }, {});
    }

    function computeBoxPrice(box) {
      const total = (box.items || []).reduce((sum, id) => sum + Number(getRecipe(id)?.sellPrice || 0), 0);
      const discountPct = Number(box.discountPct || 0);
      const discounted = total * (1 - discountPct / 100);
      return Math.max(0, Math.round(discounted));
    }

    function syncBoxPrices() {
      app.state.boxes.forEach(box => {
        if (!box.manualPrice) box.price = computeBoxPrice(box);
      });
    }

    function computePlan() {
      const plan = app.state.plan || [];
      const needMap = new Map();
      plan.forEach(entry => {
        const recipe = getRecipe(entry.recipeId);
        if (!recipe) return;
        (recipe.ingredients || []).forEach(line => {
          const prev = needMap.get(line.id) || 0;
          needMap.set(line.id, prev + (Number(line.amount || 0) * Number(entry.amount || 0)));
        });
      });
      return [...needMap.entries()].map(([id, need]) => {
        const ingredient = getIngredient(id) || { name:id, supplier:'onbekend', stock:0, price:0 };
        const stock = Number(ingredient.stock || 0);
        const buy = Math.max(0, need - stock);
        return {
          id,
          name: ingredient.name,
          supplier: ingredient.supplier,
          need,
          stock,
          buy,
          subtotal: buy * Number(ingredient.price || 0)
        };
      }).sort((a,b) => a.name.localeCompare(b.name, 'nl'));
    }

      row.innerHTML = `

    function autoCalories() {
      const type = document.getElementById('recipeType')?.value;
      const field = document.getElementById('recipeCalories');
      if (!field) return;
      if (type === 'main') field.value = 1000;
      if (type === 'snack') field.value = 400;
      if (type === 'drink') field.value = 600;
    }

    function updateBoxPriceHint() {
      const hint = document.getElementById('boxPriceHint');
      if (!hint) return;
      const ids = [...document.querySelectorAll('.boxRecipeSelect')].map(el => el.value).filter(Boolean);
      const sum = ids.reduce((s,id) => s + Number(getRecipe(id)?.sellPrice || 0), 0);
      const discount = Number(document.getElementById('boxDiscount')?.value || 0);
      const auto = Math.max(0, Math.round(sum * (1 - discount / 100)));
      const manual = document.getElementById('boxManualPrice')?.checked;
      hint.textContent = manual
        ? `Som recepten: ${formatMoney(sum)} · Automatisch voorstel: ${formatMoney(auto)} · Handmatige prijs actief.`
        : `Som recepten: ${formatMoney(sum)} · Automatische boxprijs: ${formatMoney(auto)}.`;
    }

    function saveIngredient() {
      const name = document.getElementById('ingName').value.trim();
      const id = (app.editingIngredientId || document.getElementById('ingId').value.trim());
      if (!name || !id) return alert('Geef minstens een naam en code op.');
      if (!app.editingIngredientId && app.state.ingredients.some(i => i.id === id)) return alert('Deze code bestaat al.');
      const payload = {
        id,
        name,
        type: document.getElementById('ingType').value,
        category: document.getElementById('ingCategory').value.trim() || 'Algemeen',
        supplier: document.getElementById('ingSupplier').value,
        unit: document.getElementById('ingUnit').value.trim() || 'stuk',
        price: Number(document.getElementById('ingPrice').value || 0),
        stock: Number(document.getElementById('ingStock').value || 0),
        minStock: Number(document.getElementById('ingMin').value || 0),
        calories_per_processed_piece: Number(document.getElementById('ingCaloriesPerProcessedPiece').value || 0),
        processed_yield: Number(document.getElementById('ingProcessedYield').value || 0),
        price_per_processed_piece: Number(document.getElementById('ingPricePerProcessedPiece').value || 0),
        weight_per_piece_g: Number(document.getElementById('ingWeightPerPieceG').value || 0),
        price_per_calorie: Number(document.getElementById('ingPricePerCalorie').value || 0),
        active: true
      };
      if (app.editingIngredientId) {
        const index = app.state.ingredients.findIndex(i => i.id === app.editingIngredientId);
        app.state.ingredients[index] = payload;
        app.editingIngredientId = null;
      } else {
        app.state.ingredients.push(payload);
      }
      saveState();
      render();
    }

    function deleteIngredient(id) {
      const used = app.state.recipes.filter(recipe => (recipe.ingredients || []).some(line => line.id === id));
      if (used.length) {
        alert(`Dit ingrediënt wordt nog gebruikt in ${used.length} recept(en). Verwijderen is nu geblokkeerd.`);
        return;
      }
      if (!confirm('Ingrediënt verwijderen?')) return;
      app.state.ingredients = app.state.ingredients.filter(item => item.id !== id);
      if (app.editingIngredientId === id) app.editingIngredientId = null;
      saveState();
      render();
    }

    function saveRecipe() {
      const name = document.getElementById('recipeName').value.trim();
      if (!name) return alert('Geef een receptnaam op.');
      const id = app.editingRecipeId || slugify(name);
      if (!app.editingRecipeId && app.state.recipes.some(r => r.id === id)) return alert('Dit recept bestaat al.');
      const lines = [...document.querySelectorAll('#recipeLines .recipe-line')].map(row => ({
        id: row.querySelector('.recipeIngSelect').value,
        amount: Number(row.querySelector('.recipeIngAmount').value || 1)
      })).filter(line => line.id && line.amount > 0);
      const payload = {
        id,
        name,
        sub: document.getElementById('recipeSub').value.trim(),
        category: document.getElementById('recipeCategory').value.trim() || 'Nieuw',
        productType: document.getElementById('recipeType').value,
        station: document.getElementById('recipeStation').value,
        animation: document.getElementById('recipeAnimation').value,
        calories: Number(document.getElementById('recipeCalories').value || 0),
        sellPrice: Number(document.getElementById('recipePrice').value || 0),
        ingredients: lines,
        active: true,
        note: ''
      };
      if (app.editingRecipeId) {
        const index = app.state.recipes.findIndex(r => r.id === app.editingRecipeId);
        app.state.recipes[index] = payload;
        app.editingRecipeId = null;
      } else {
        app.state.recipes.push(payload);
      }
      saveState();
      render();
    }

    function deleteRecipe(id) {
      const used = app.state.boxes.filter(box => (box.items || []).includes(id));
      if (used.length) {
        alert(`Dit recept zit nog in ${used.length} box(en). Verwijderen is nu geblokkeerd.`);
        return;
      }
      if (!confirm('Recept verwijderen?')) return;
      app.state.recipes = app.state.recipes.filter(item => item.id !== id);
      app.state.plan = app.state.plan.filter(item => item.recipeId !== id);
      if (app.editingRecipeId === id) app.editingRecipeId = null;
      saveState();
      render();
    }

    function saveBox() {
      const name = document.getElementById('boxName').value.trim();
      if (!name) return alert('Geef een boxnaam op.');
      const id = app.editingBoxId || slugify(name);
      if (!app.editingBoxId && app.state.boxes.some(b => b.id === id)) return alert('Deze box bestaat al.');
      const items = [...document.querySelectorAll('.boxRecipeSelect')].map(el => el.value).filter(Boolean);
      const manualPrice = document.getElementById('boxManualPrice').checked;
      const discountPct = Number(document.getElementById('boxDiscount').value || 0);
      const payload = {
        id,
        name,
        theme: document.getElementById('boxTheme').value.trim() || 'Algemeen',
        promo: document.getElementById('boxPromo').value.trim(),
        active: true,
        discountPct,
        manualPrice,
        price: manualPrice ? Number(document.getElementById('boxPrice').value || 0) : 0,
        items
      };
      if (!manualPrice) payload.price = computeBoxPrice(payload);
      if (app.editingBoxId) {
        const index = app.state.boxes.findIndex(b => b.id === app.editingBoxId);
        app.state.boxes[index] = payload;
        app.editingBoxId = null;
      } else {
        app.state.boxes.push(payload);
      }
      saveState();
      render();
    }

    function deleteBox(id) {
      if (!confirm('Box verwijderen?')) return;
      app.state.boxes = app.state.boxes.filter(item => item.id !== id);
      if (app.editingBoxId === id) app.editingBoxId = null;
      saveState();
      render();
    }

    function addPlanItem() {
      const recipeId = document.getElementById('stockRecipe').value;
      const amount = Number(document.getElementById('stockAmount').value || 1);
      if (!recipeId || amount <= 0) return;
      app.state.plan.push({ recipeId, amount });
      saveState();
      render();
    }

    function clearPlan() {
      if (!confirm('Planning leegmaken?')) return;
      app.state.plan = [];
      saveState();
      render();
    }

    function saveShop() {
      app.state.shop.name = document.getElementById('shopName').value.trim() || app.state.shop.name;
      app.state.shop.subtitle = document.getElementById('shopSub').value.trim() || app.state.shop.subtitle;
      app.state.shop.tagline = document.getElementById('shopTag').value.trim() || app.state.shop.tagline;
      const file = document.getElementById('shopLogoInput').files?.[0];
      if (!file) {
        saveState();
        render();
        return;
      }
      const reader = new FileReader();
      reader.onload = () => {
        app.state.shop.logo = reader.result;
        saveState();
        render();
      };
      reader.readAsDataURL(file);
    }

    function exportJson() {
      const payload = JSON.stringify(app.state, null, 2);
      const blob = new Blob([payload], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'gezellig-hoekje-data-v2.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function applyImportedState(data) {
      if (!data || typeof data !== 'object') throw new Error('Ongeldige JSON-structuur.');
      app.state = {
        ...clone(DEFAULT_DATA),
        ...data,
        shop: { ...clone(DEFAULT_DATA).shop, ...(data.shop || {}) },
        settings: { ...clone(DEFAULT_DATA).settings, ...(data.settings || {}) },
        ingredients: Array.isArray(data.ingredients) ? data.ingredients : clone(DEFAULT_DATA).ingredients,
        recipes: Array.isArray(data.recipes) ? data.recipes : clone(DEFAULT_DATA).recipes,
        boxes: Array.isArray(data.boxes) ? data.boxes : clone(DEFAULT_DATA).boxes,
        plan: Array.isArray(data.plan) ? data.plan : []
      };
      app.editingIngredientId = null;
      app.editingRecipeId = null;
      app.editingBoxId = null;
      saveState();
      render();
    }

    function importJsonFile(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          applyImportedState(JSON.parse(reader.result));
        } catch (error) {
          alert(`Import mislukt: ${error.message}`);
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function importJsonText() {
      const text = document.getElementById('importText').value.trim();
      if (!text) return alert('Plak eerst JSON in het tekstvak.');
      try {
        applyImportedState(JSON.parse(text));
      } catch (error) {
        alert(`Import mislukt: ${error.message}`);
      }
    }


    const apiConfigKey = 'gezellig-hoekje-google-api-config';

    function loadApiConfig() {
      try {
        return JSON.parse(localStorage.getItem(apiConfigKey) || '{"url":"","token":""}');
      } catch (error) {
        return { url:'', token:'' };
      }
    }

    function populateApiForm() {
      const cfg = loadApiConfig();
      const urlEl = document.getElementById('apiUrl');
      const tokenEl = document.getElementById('apiToken');
      if (urlEl) urlEl.value = cfg.url || '';
      if (tokenEl) tokenEl.value = cfg.token || '';
      updateStorageBadge(cfg.url);
    }

    function updateStorageBadge(hasUrl) {
      const badge = document.getElementById('storageBadge');
      if (!badge) return;
      badge.textContent = hasUrl ? 'Google Sheet + lokaal' : 'Lokaal';
    }

    function saveApiConfigFromForm() {
      const cfg = {
        url: document.getElementById('apiUrl')?.value.trim() || '',
        token: document.getElementById('apiToken')?.value.trim() || ''
      };
      localStorage.setItem(apiConfigKey, JSON.stringify(cfg));
      updateStorageBadge(cfg.url);
      setApiStatus(cfg.url ? 'API-config opgeslagen.' : 'API-config gewist.');
    }

    function getApiConfig() {
      return loadApiConfig();
    }

    function setApiStatus(message, isError = false) {
      const el = document.getElementById('apiStatusHint');
      if (!el) return;
      el.textContent = message;
      el.style.color = isError ? 'var(--bad)' : 'var(--muted)';
    }

    async function apiGet(action) {
      const cfg = getApiConfig();
      if (!cfg.url) throw new Error('Geen Apps Script URL ingevuld.');
      const res = await fetch(`${cfg.url}?action=${encodeURIComponent(action)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function apiPost(action, data = {}) {
      const cfg = getApiConfig();
      if (!cfg.url) throw new Error('Geen Apps Script URL ingevuld.');
      if (!cfg.token) throw new Error('Geen API token ingevuld.');
      const res = await fetch(cfg.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: cfg.token,
          action,
          data
        })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function testGoogleApi() {
      try {
        saveApiConfigFromForm();
        const response = await apiGet('health');
        if (!response.ok) throw new Error(response.error || 'Onbekende fout');
        setApiStatus(`API ok — ${response.data.timestamp}`);
        alert('Verbinding met de Apps Script API is gelukt.');
      } catch (error) {
        console.error(error);
        setApiStatus(`Verbinding mislukt: ${error.message}`, true);
        alert(`Verbinding mislukt: ${error.message}`);
      }
    }

    async function loadFromGoogle() {
      try {
        saveApiConfigFromForm();
        setApiStatus('Data wordt geladen...');
        const response = await apiGet('data.all');
        if (!response.ok) throw new Error(response.error || 'Onbekende fout');
        applyImportedState(response.data || {});
        setApiStatus('Data succesvol geladen uit Google Sheet.');
      } catch (error) {
        console.error(error);
        setApiStatus(`Laden mislukt: ${error.message}`, true);
        alert(`Laden mislukt: ${error.message}`);
      }
    }

    async function saveToGoogle() {
      try {
        saveApiConfigFromForm();
        setApiStatus('Data wordt opgeslagen...');
        const response = await apiPost('import.all', app.state);
        if (!response.ok) throw new Error(response.error || 'Onbekende fout');
        setApiStatus('Data succesvol opgeslagen naar Google Sheet.');
        alert('De huidige dataset is opgeslagen naar Google Sheets.');
      } catch (error) {
        console.error(error);
        setApiStatus(`Opslaan mislukt: ${error.message}`, true);
        alert(`Opslaan mislukt: ${error.message}`);
      }
    }


    function updateBrandLogo() {
      const wrap = document.getElementById('brandLogo');
      wrap.innerHTML = app.state.shop.logo ? `<img src="${app.state.shop.logo}" alt="Logo">` : 'GH';
    }

    function render() {
      updateBrandLogo();
      renderNav();
      renderSidebar();
      document.querySelectorAll('.workspace > section').forEach(section => section.classList.add('hidden'));
      document.getElementById(`view-${app.view}`).classList.remove('hidden');
      if (app.view === 'dashboard') renderDashboard();
      if (app.view === 'ingredients') renderIngredients();
      if (app.view === 'recipes') renderRecipes();
      if (app.view === 'boxes') renderBoxes();
      if (app.view === 'stock') renderStock();
      if (app.view === 'menu') renderMenu();
    }

    render();
  </script>
</body>
</html>
