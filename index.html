<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Menu Generator V2</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  display: flex;
  gap: 20px;
  padding: 20px;
}

textarea {
  width: 300px;
  height: 400px;
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.canvas {
  width: 600px;
  height: 900px;
  padding: 20px;
  background: #1e1e1e;
}

.chalk {
  font-family: "Courier New", monospace;
}

.modern {
  background: #f5f5f5;
  color: #111;
}

.wood {
  background: #5a3e2b;
}

h1 {
  text-align: center;
}

.section {
  margin-top: 20px;
}

.item {
  display: flex;
  justify-content: space-between;
}
</style>
</head>

<body>

<div class="controls">
  <h2>Menu input</h2>
  <textarea id="input">
# Koffie
De Klassieke Knuffel | Cappuccino | 4
De Snelle Shot | Espresso | 3

# Tosti's
De Italiaanse Smelt | Mozzarella | 7
  </textarea>

  <label>Stijl:</label>
  <select id="style">
    <option value="chalk">Chalkboard</option>
    <option value="modern">Modern</option>
    <option value="wood">Vintage</option>
  </select>

  <label>Standaard prijs:</label>
  <input id="defaultPrice" type="number" placeholder="bv 5">

  <button onclick="generate()">Genereer</button>
  <button onclick="download()">Download PNG</button>
</div>

<div id="canvas" class="canvas chalk"></div>

<script>
function generate() {
  const input = document.getElementById("input").value;
  const canvas = document.getElementById("canvas");
  const style = document.getElementById("style").value;
  const defaultPrice = document.getElementById("defaultPrice").value;

  canvas.className = "canvas " + style;
  canvas.innerHTML = "<h1>'t Gezellig Hoekje</h1>";

  const lines = input.split("\n");

  let currentSection;

  lines.forEach(line => {
    line = line.trim();
    if (!line) return;

    if (line.startsWith("#")) {
      currentSection = document.createElement("div");
      currentSection.className = "section";
      currentSection.innerHTML = "<h2>" + line.replace("#", "") + "</h2>";
      canvas.appendChild(currentSection);
    } else {
      const parts = line.split("|").map(p => p.trim());

      const name = parts[0];
      const desc = parts[1] || "";
      const price = parts[2] || defaultPrice || "";

      const el = document.createElement("div");
      el.className = "item";
      el.innerHTML = `
        <span>${name} (${desc})</span>
        <span>${price ? "€" + price : ""}</span>
      `;
      currentSection.appendChild(el);
    }
  });
}

function download() {
  html2canvas(document.getElementById("canvas")).then(canvas => {
    const link = document.createElement("a");
    link.download = "menu.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>
